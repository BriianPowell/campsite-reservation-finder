name: Camply Search

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

concurrency:
  group: camply-search
  cancel-in-progress: false

jobs:
  search:
    name: Run Camply searches
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TZ: America/Los_Angeles
      EMAIL_TO_ADDRESS: ${{ secrets.EMAIL_TO_ADDRESS }}
      EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate required email secrets
        run: |
          missing=0
          for name in EMAIL_TO_ADDRESS EMAIL_USERNAME EMAIL_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required GitHub Actions secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Export optional email settings
        env:
          EMAIL_FROM_ADDRESS_SECRET: ${{ secrets.EMAIL_FROM_ADDRESS }}
          EMAIL_SUBJECT_LINE_SECRET: ${{ secrets.EMAIL_SUBJECT_LINE }}
          EMAIL_SMTP_SERVER_SECRET: ${{ secrets.EMAIL_SMTP_SERVER }}
          EMAIL_SMTP_PORT_SECRET: ${{ secrets.EMAIL_SMTP_PORT }}
        run: |
          [[ -n "${EMAIL_FROM_ADDRESS_SECRET}" ]] && echo "EMAIL_FROM_ADDRESS=${EMAIL_FROM_ADDRESS_SECRET}" >> "${GITHUB_ENV}"
          [[ -n "${EMAIL_SUBJECT_LINE_SECRET}" ]] && echo "EMAIL_SUBJECT_LINE=${EMAIL_SUBJECT_LINE_SECRET}" >> "${GITHUB_ENV}"
          [[ -n "${EMAIL_SMTP_SERVER_SECRET}" ]] && echo "EMAIL_SMTP_SERVER=${EMAIL_SMTP_SERVER_SECRET}" >> "${GITHUB_ENV}"
          [[ -n "${EMAIL_SMTP_PORT_SECRET}" ]] && echo "EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT_SECRET}" >> "${GITHUB_ENV}"

      - name: Run Camply searches
        run: ./scripts/run-searches.sh
