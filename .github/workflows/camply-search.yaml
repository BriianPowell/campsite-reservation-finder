name: Camply Search

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

concurrency:
  group: camply-search
  cancel-in-progress: false

jobs:
  search:
    name: Run Camply searches
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TZ: America/Los_Angeles
      APPRISE_URL: ${{ secrets.APPRISE_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate required notification secrets
        run: |
          if [[ -z "${APPRISE_URL:-}" ]]; then
            echo "::error::Missing required GitHub Actions secret: APPRISE_URL"
            exit 1
          fi

      - name: Restore notification state
        uses: actions/cache@v4
        with:
          path: .cache
          key: camply-notifications-${{ github.run_id }}
          restore-keys: |
            camply-notifications-

      - name: Run Camply searches
        run: python -m camply_runner
